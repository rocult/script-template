name: Bug report
description: Report something that's broken
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal reproduction. Code blocks help.
      placeholder: |
        1. Run `mise …`
        2. See error: `…`
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Output of `mise ls` and `pesde --version` if relevant.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      render: shell
    validations:
      required: false
